<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NOLABEL · 송장 QR 생성기 (데모)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  /* QR 라이브러리 (davidshimjs qrcodejs) 를 여러 CDN 후보로 순차 시도.
     하나가 onerror 또는 load 후 window.QRCode 정의 실패면 다음 후보로 폴백. */
  window.__qrLibLoaded  = false;
  window.__qrLibError   = null;
  window.__qrLibUrl     = null;
  window.__qrLibReady   = new Promise(resolve => { window.__qrLibResolve = resolve; });

  (function loadQrLib() {
    /* qrcode-generator (Kazuhiko Arase): typeNumber:0 으로 진짜 auto-detect 동작,
       UTF-8 byte mode 지원. davidshimjs qrcodejs 의 auto 가 한글 overflow 내는 문제 회피. */
    const URLS = [
      'https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js',
      'https://unpkg.com/qrcode-generator@1.4.4/qrcode.js',
      'https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js'
    ];
    let i = 0;
    function tryNext() {
      if (i >= URLS.length) {
        window.__qrLibError = '모든 QR CDN 후보 로드 실패 (' + URLS.length + '개 시도)';
        console.error('[QR-GEN] ✗', window.__qrLibError);
        window.__qrLibResolve(false);
        return;
      }
      const url = URLS[i++];
      console.log('[QR-GEN] CDN 시도 (' + i + '/' + URLS.length + '):', url);
      const s = document.createElement('script');
      s.src = url;
      s.async = false;
      s.onload = function () {
        if (typeof window.qrcode === 'function') {
          // 한글(UTF-8) byte mode 필수 — 기본은 Latin-1 이라서 한글 깨짐
          try {
            if (window.qrcode.stringToBytesFuncs && window.qrcode.stringToBytesFuncs['UTF-8']) {
              window.qrcode.stringToBytes = window.qrcode.stringToBytesFuncs['UTF-8'];
            } else if (typeof TextEncoder !== 'undefined') {
              const enc = new TextEncoder();
              window.qrcode.stringToBytes = function (s) { return Array.from(enc.encode(s)); };
            }
          } catch (_) {}
          window.__qrLibLoaded = true;
          window.__qrLibUrl    = url;
          console.log('[QR-GEN] ✓ 로드 성공:', url);
          window.__qrLibResolve(true);
        } else {
          console.warn('[QR-GEN] 스크립트는 로드됐으나 window.qrcode 미정의:', url);
          tryNext();
        }
      };
      s.onerror = function (e) {
        console.warn('[QR-GEN] ✗ CDN 실패:', url, e && e.type);
        tryNext();
      };
      document.head.appendChild(s);
    }
    tryNext();
  })();
</script>

<style>
  :root {
    --primary: #2b59ff;
    --primary-soft: #eaf0ff;
    --ink: #1a2233;
    --ink-2: #4a5568;
    --ink-3: #8693a8;
    --line: #e6eaf2;
    --accent: #00b894;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                 "Noto Sans KR", sans-serif;
    background: #eef1f6; color: var(--ink);
  }
  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--ink-3); font-size: 13px; margin-bottom: 18px; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 18px;
  }
  @media (max-width: 760px) {
    .grid { grid-template-columns: 1fr; }
  }

  .card {
    background: #fff;
    border-radius: 14px;
    border: 1px solid var(--line);
    padding: 14px;
    box-shadow: 0 4px 14px rgba(20,30,60,0.05);
  }
  .card h3 { margin: 0 0 10px; font-size: 14px; }
  .form-hint { font-size: 11px; color: var(--ink-3); margin: -4px 0 0; }

  /* 지오코딩 실패 폴백 섹션 (기본 숨김) */
  #fallback-section {
    margin-top: 16px;
    padding: 12px;
    border: 1px solid #f0d99a;
    border-radius: 10px;
    background: linear-gradient(135deg, #fff8e8, #fff1d3);
  }
  #fallback-section .warn {
    font-size: 12.5px;
    color: #6b4500;
    font-weight: 700;
    margin-bottom: 8px;
    display: flex; gap: 6px; align-items: center;
  }
  #map { height: 280px; border-radius: 10px; overflow: hidden; }
  .coord-row {
    display: flex; gap: 8px; margin-top: 10px; align-items: center;
    font-size: 12px; color: var(--ink-2);
  }
  .coord-row code {
    background: var(--primary-soft); color: var(--primary);
    padding: 4px 8px; border-radius: 6px;
    font-family: "SF Mono", ui-monospace, monospace;
  }
  .geo-status {
    margin-top: 8px;
    font-size: 11.5px;
    color: var(--ink-3);
    min-height: 16px;
  }
  .geo-status.ok { color: var(--accent); font-weight: 700; }
  .geo-status.err { color: #b42318; font-weight: 700; }

  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .form-group label { font-size: 11px; font-weight: 700; color: var(--ink-2); letter-spacing: 0.3px; }
  .form-group input {
    height: 42px;
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 0 12px;
    font-size: 14px;
    background: #fbfcfe;
    outline: none;
  }
  .form-group input:focus { border-color: var(--primary); background: #fff; }

  .btn {
    width: 100%;
    height: 46px;
    border-radius: 10px;
    border: none;
    background: var(--primary);
    color: #fff;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
  }
  .btn:hover { background: #1a3fcc; }
  .btn.ghost {
    background: #f3f5fb; color: var(--ink);
  }

  .qr-box {
    margin-top: 14px;
    background: #fff;
    border-radius: 10px;
    padding: 14px;
    border: 1px dashed var(--line);
    display: flex; flex-direction: column; align-items: center;
    gap: 10px;
    min-height: 220px;
    justify-content: center;
  }
  .qr-box small {
    color: var(--ink-3); font-size: 11px;
    word-break: break-all;
  }
  .actions { display: flex; gap: 8px; margin-top: 10px; }
  .preset-list {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
  }
  .preset-list button {
    background: var(--primary-soft); color: var(--primary);
    border: none; padding: 6px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 700; cursor: pointer;
  }
  .hint {
    font-size: 11px; color: var(--ink-3); margin-top: 8px;
  }
</style>
</head>
<body>

<div class="wrap">
  <h1>📦 NOLABEL 송장 QR 생성기</h1>
  <p class="sub">지도에서 배송지 위치를 클릭한 뒤 정보를 입력하고 'QR 생성'을 누르세요. 생성된 QR을 기사 앱에서 스캔하면 등록됩니다.</p>

  <div class="grid">
    <!-- 왼쪽: 폼 (지도는 폴백) -->
    <div class="card">
      <h3>송장 정보 입력</h3>

      <div class="form-group">
        <label>송장 ID</label>
        <input id="f-id" placeholder="ND-2026-0608-001" />
      </div>
      <div class="form-group">
        <label>수취인 이름</label>
        <input id="f-name" placeholder="김민준" />
      </div>
      <div class="form-group">
        <label>주소 ★</label>
        <input id="f-address" placeholder="강원도 춘천시 효자동 123-45" />
        <p class="form-hint">생성 시 OpenStreetMap 지오코더로 좌표가 자동 변환됩니다.</p>
      </div>
      <div class="form-group">
        <label>연락처</label>
        <input id="f-phone" placeholder="010-1234-5678" />
      </div>
      <div class="form-group">
        <label>지역 코드 (선택)</label>
        <input id="f-region" placeholder="CC-01" />
      </div>

      <div class="actions">
        <button class="btn" onclick="generateQR()">QR 생성 ▸</button>
        <button class="btn ghost" onclick="nextPreset()">⏭ 다음 데모 송장</button>
      </div>

      <div id="geo-status" class="geo-status"></div>

      <div class="preset-list">
        <button onclick="loadPreset(0)">데모 1 · 김민준</button>
        <button onclick="loadPreset(1)">데모 2 · 이서연</button>
        <button onclick="loadPreset(2)">데모 3 · 박지호</button>
        <button onclick="loadPreset(3)">데모 4 · 최수아</button>
      </div>
      <p class="hint" style="font-size:11px; color:var(--ink-3); margin-top:8px;">💡 PC 화면을 켜둔 채 기사 앱(아이폰 Safari)에서 카메라를 비추면 됩니다.</p>

      <!-- 지오코딩 실패 시만 노출되는 보정용 미니맵 -->
      <div id="fallback-section" style="display:none;">
        <div class="warn">⚠️ <span>주소를 좌표로 변환하지 못했습니다. 지도에서 위치를 직접 찍어 보정하세요</span></div>
        <div id="map"></div>
        <div class="coord-row">
          <span>선택 좌표:</span>
          <code id="coord-text">아직 선택되지 않음</code>
        </div>
        <button class="btn" style="margin-top:10px;" onclick="generateWithPickedCoords()">선택 좌표로 QR 생성 ▸</button>
      </div>
    </div>

    <!-- 오른쪽: QR 결과 -->
    <div class="card">
      <h3>생성된 QR</h3>
      <div class="qr-box" id="qr-box">
        <div style="color:var(--ink-3); font-size:13px;">좌표·정보 입력 후 'QR 생성'을 눌러주세요.</div>
      </div>
    </div>
  </div>
</div>

<script>
  /* ===========================================================
     상태
     =========================================================== */
  let selectedLat = null, selectedLng = null;
  let fallbackMap = null, pickedMarker = null;
  const geocodeCache = new Map();   // 주소 → {lat,lng} | null
  let lastGeoCallAt = 0;            // Nominatim 1초 throttle

  /* ===========================================================
     데모 프리셋 (춘천 부근) — 주소 → 좌표 미리 캐시해서
     데모 시 Nominatim 호출 없이 즉시 동작.
     =========================================================== */
  const PRESETS = [
    { id: "ND-2026-0608-001", name: "김민준", address: "강원도 춘천시 효자동 123-45",                       phone: "010-1234-5678", region: "CC-01", lat: 37.8765, lng: 127.7320 },
    { id: "ND-2026-0608-002", name: "이서연", address: "강원도 춘천시 석사동 567-89",                       phone: "010-2345-6789", region: "CC-02", lat: 37.8694, lng: 127.7427 },
    { id: "ND-2026-0608-003", name: "박지호", address: "강원도 춘천시 후평동 234-56 NOLABEL빌딩 302호",     phone: "010-3456-7890", region: "CC-03", lat: 37.8800, lng: 127.7530 },
    { id: "ND-2026-0608-004", name: "최수아", address: "강원도 춘천시 퇴계동 891-23",                       phone: "010-4567-8901", region: "CC-04", lat: 37.8580, lng: 127.7240 }
  ];
  PRESETS.forEach(p => geocodeCache.set(p.address.trim(), { lat: p.lat, lng: p.lng }));

  let presetIdx = 0;
  function loadPreset(i) {
    const p = PRESETS[i];
    if (!p) return;
    presetIdx = i;
    document.getElementById('f-id').value      = p.id;
    document.getElementById('f-name').value    = p.name;
    document.getElementById('f-address').value = p.address;
    document.getElementById('f-phone').value   = p.phone;
    document.getElementById('f-region').value  = p.region;
    selectedLat = null; selectedLng = null;
    hideFallback();
    setGeoStatus('');
  }
  function nextPreset() {
    presetIdx = (presetIdx + 1) % PRESETS.length;
    loadPreset(presetIdx);
    generateQR();
  }

  /* ===========================================================
     Nominatim 지오코딩
     =========================================================== */
  function setGeoStatus(msg, kind) {
    const el = document.getElementById('geo-status');
    el.textContent = msg || '';
    el.className = 'geo-status' + (kind ? ' ' + kind : '');
  }

  async function geocode(address) {
    const key = address.trim();
    if (!key) return null;
    if (geocodeCache.has(key)) {
      console.log('[GEO] cache hit:', key);
      return geocodeCache.get(key);
    }
    // 1초 throttle (Nominatim 사용 정책)
    const wait = Math.max(0, 1000 - (Date.now() - lastGeoCallAt));
    if (wait > 0) await new Promise(r => setTimeout(r, wait));
    lastGeoCallAt = Date.now();

    const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&accept-language=ko&q=' + encodeURIComponent(key);
    console.log('[GEO] Nominatim →', url);
    const res = await fetch(url, { headers: { 'Accept-Language': 'ko' } });
    if (!res.ok) throw new Error('Nominatim HTTP ' + res.status);
    const arr = await res.json();
    if (!arr || arr.length === 0) {
      geocodeCache.set(key, null);
      console.warn('[GEO] no result for:', key);
      return null;
    }
    const result = { lat: parseFloat(arr[0].lat), lng: parseFloat(arr[0].lon) };
    geocodeCache.set(key, result);
    console.log('[GEO] ✓', key, '→', result);
    return result;
  }

  /* ===========================================================
     폴백 지도 (실패 시만 lazy-init)
     =========================================================== */
  function showFallback(centerHint) {
    const sec = document.getElementById('fallback-section');
    sec.style.display = 'block';

    if (!fallbackMap) {
      fallbackMap = L.map('map').setView(centerHint || [37.881, 127.730], 13);
      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(fallbackMap);
      fallbackMap.on('click', (e) => {
        selectedLat = +e.latlng.lat.toFixed(5);
        selectedLng = +e.latlng.lng.toFixed(5);
        document.getElementById('coord-text').textContent = `lat=${selectedLat}, lng=${selectedLng}`;
        if (pickedMarker) fallbackMap.removeLayer(pickedMarker);
        pickedMarker = L.marker([selectedLat, selectedLng]).addTo(fallbackMap);
      });
    }
    setTimeout(() => fallbackMap.invalidateSize(), 100);
    if (centerHint) fallbackMap.setView(centerHint, 13);
  }
  function hideFallback() {
    document.getElementById('fallback-section').style.display = 'none';
  }

  function showQrError(msg) {
    console.error('[QR-GEN]', msg);
    const box = document.getElementById('qr-box');
    box.innerHTML =
      '<div style="color:#b42318; font-size:13px; font-weight:700; text-align:center; padding:18px; line-height:1.5;">' +
      '⚠️ ' + msg +
      '</div>';
  }

  function libReady() {
    return typeof window.qrcode === 'function';
  }

  /* ===========================================================
     QR 생성 — 주소를 지오코딩 → 좌표 자동 채움 → QR 렌더
     =========================================================== */
  async function generateQR() {
    console.log('[QR-GEN] generateQR() called');

    if (!libReady()) {
      if (window.__qrLibError) {
        showQrError('QR 라이브러리 CDN 로드 실패: ' + window.__qrLibError + '. 새로고침해주세요.');
      } else {
        showQrError('QR 라이브러리 로드 대기 중입니다. 잠시 후 다시 시도하세요.');
      }
      return;
    }

    const id      = document.getElementById('f-id').value.trim();
    const name    = document.getElementById('f-name').value.trim();
    const address = document.getElementById('f-address').value.trim();
    const phone   = document.getElementById('f-phone').value.trim();
    const region  = document.getElementById('f-region').value.trim();

    if (!id || !name)   { alert('송장 ID와 수취인 이름은 필수입니다'); return; }
    if (!address)       { alert('주소를 입력해주세요'); return; }

    // 주소 → 좌표 (Nominatim, 캐시 우선)
    setGeoStatus('🌐 주소를 좌표로 변환 중...', '');
    let coords;
    try {
      coords = await geocode(address);
    } catch (e) {
      console.error('[GEO] 호출 실패:', e);
      setGeoStatus('지오코딩 오류: ' + (e.message || e) + ' — 지도에서 보정해주세요', 'err');
      showFallback();
      return;
    }
    if (!coords) {
      setGeoStatus('주소를 좌표로 변환하지 못했습니다. 지도에서 위치를 직접 찍어 보정하세요', 'err');
      showFallback();
      return;
    }
    setGeoStatus(`✓ 좌표 변환 성공 (${coords.lat.toFixed(5)}, ${coords.lng.toFixed(5)})`, 'ok');
    hideFallback();

    renderQR({ id, name, address, phone, region, lat: coords.lat, lng: coords.lng });
  }

  // 폴백 지도에서 사용자가 찍은 좌표로 QR 생성
  function generateWithPickedCoords() {
    if (selectedLat === null || selectedLng === null) {
      alert('지도에서 위치를 먼저 클릭해주세요');
      return;
    }
    const id      = document.getElementById('f-id').value.trim();
    const name    = document.getElementById('f-name').value.trim();
    const address = document.getElementById('f-address').value.trim();
    const phone   = document.getElementById('f-phone').value.trim();
    const region  = document.getElementById('f-region').value.trim();
    if (!id || !name) { alert('송장 ID와 수취인 이름은 필수입니다'); return; }
    setGeoStatus(`✓ 수동 좌표 (${selectedLat}, ${selectedLng}) 로 생성`, 'ok');
    // 캐시에 저장 → 같은 주소 다음 호출 시 즉시 사용
    if (address) geocodeCache.set(address, { lat: selectedLat, lng: selectedLng });
    renderQR({ id, name, address, phone, region, lat: selectedLat, lng: selectedLng });
  }

  function renderQR(payload) {
    const text = JSON.stringify({
      id: payload.id,
      name: payload.name,
      address: payload.address,
      phone: payload.phone,
      lat: payload.lat,
      lng: payload.lng,
      ...(payload.region ? { region: payload.region } : {})
    });
    console.log('[QR-GEN] payload (' + text.length + ' chars) =', text);

    const box = document.getElementById('qr-box');
    box.innerHTML = '';

    let qr;
    try {
      qr = window.qrcode(0, 'L');
      qr.addData(text);
      qr.make();
      console.log('[QR-GEN] ✓ QR built, moduleCount =', qr.getModuleCount());
    } catch (e) {
      showQrError('QR 생성 예외: ' + (e && e.message || e));
      return;
    }

    const moduleCount = qr.getModuleCount();
    const margin = 2;
    const cellSize = Math.max(1, Math.floor((240 - margin * 2) / moduleCount));

    const wrapper = document.createElement('div');
    wrapper.innerHTML = qr.createImgTag(cellSize, margin);
    const img = wrapper.querySelector('img');
    img.alt = 'NOLABEL 송장 QR';
    img.style.cssText = 'display:block; width:240px; height:auto; image-rendering:pixelated; border-radius:6px;';
    box.appendChild(img);

    const okMsg = document.createElement('div');
    okMsg.style.cssText = 'margin-top:12px; color:#00875a; font-size:12px; font-weight:700; text-align:center;';
    okMsg.textContent = '✓ QR 이 생성되었습니다';
    box.appendChild(okMsg);
  }

  // 부트스트랩 — 라이브러리 준비 후 데모 1 자동 생성
  async function bootstrap() {
    loadPreset(0);
    const ok = await window.__qrLibReady;
    if (ok) {
      generateQR();
    } else {
      showQrError('QR 라이브러리 CDN 로드 실패: ' + (window.__qrLibError || 'unknown'));
    }
  }
  bootstrap();
</script>

</body>
</html>
<!-- NOLABEL · 데모용 송장 QR 생성기 — 주소 기반 좌표 + QR 출력 -->
